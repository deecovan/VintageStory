version: 7


############
## Добыча ##
############

# Позволяет изменять настройки и дополнения добычи в BetterRuins. Установите значение 0, чтобы полностью отключить.
loot: 1 # from 0 to 10 (default: 1) 
# Указывает вероятность генерации блоков метеоритов в BetterRuins. Установите 100%, чтобы метеориты появлялись во всех подходящих блоках, или уменьшите процент для регулировки их редкости. Установите 0%, чтобы полностью отключить метеориты.
meteorvalue: 25 # from 0 to 100 (default: 25) 


#############
## Легенды ##
#############

# Позволяет включить или отключить генерацию контента лора в BetterRuins. Отключите, чтобы предотвратить генерацию.
lore: true #  (default: True) 


#################################
## Общая вероятность генерации ##
#################################

# Влияет на вероятность генерации всех структур (кроме деревень).
structures_spawn_chance: 1 # from 0 to 100 (default: 1) 
# Влияет на вероятность генерации всех деревень, которые представляют собой группы мелких структур, расположенных близко друг к другу (не отдельные структуры).
villages_spawn_chance: 1 # from 0 to 100 (default: 1) 


##############################
## Глобальные мегаструктуры ##
##############################

# Указывает минимальное расстояние, которое эта структура должна поддерживать от других структур в своей группе, измеряемое в блоках.
megastructures_min_distance: 6500 # from 0 to 40000 (default: 6500) 


